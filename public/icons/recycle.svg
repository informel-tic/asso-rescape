<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="#2E7D32">
  <!-- 
    Symbole recyclage vectoriel propre (Möbius loop)
    Centré sur (50,50)
    Couleur: Forest Green (#2E7D32)
  -->
  <g transform="translate(50,50) scale(0.9)">
    <!-- Flèche 1 (Haut) -->
    <path d="M-5.3,-28.5 C-15,-23 -21,-13 -23,0 L-31,0 L-18.5,21.5 L-6,0 L-14,0 C-12.5,-9 -8,-17 0,-21 L-5.3,-28.5 Z" transform="rotate(180)"/>
    
    <!-- Flèche 2 (Bas Droite) -->
    <path d="M-5.3,-28.5 C-15,-23 -21,-13 -23,0 L-31,0 L-18.5,21.5 L-6,0 L-14,0 C-12.5,-9 -8,-17 0,-21 L-5.3,-28.5 Z" transform="rotate(300)"/>

    <!-- Flèche 3 (Bas Gauche) -->
    <path d="M-5.3,-28.5 C-15,-23 -21,-13 -23,0 L-31,0 L-18.5,21.5 L-6,0 L-14,0 C-12.5,-9 -8,-17 0,-21 L-5.3,-28.5 Z" transform="rotate(60)"/>
  </g>
</svg>
