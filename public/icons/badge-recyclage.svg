<svg viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg" aria-label="Badge recyclage – Ouvert à tous" role="img">
    <defs>
        <!-- Chemin circulaire pour le texte -->
        <!-- r=30 pour être très proche du cercle central (r=24) -->
        <path id="circlePath" d="M 50,50 m -30,0 a 30,30 0 1,1 60,0 a 30,30 0 1,1 -60,0" />

        <!-- Dégradé léger pour le cercle central -->
        <radialGradient id="centerWhite" cx="50%" cy="50%" r="50%">
            <stop offset="70%" stopColor="#ffffff" />
            <stop offset="100%" stopColor="#f4f1ea" />
        </radialGradient>

        <!-- Ombre portée pour détacher le cercle du fond transparent -->
        <filter id="dropShadow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2c1a0e" flood-opacity="0.15" />
        </filter>

        <!-- Gradients pour l'icône Möbius (Effet Ruban 3D) -->
        <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stopColor="#2E7D32" />   <!-- Foncé -->
            <stop offset="100%" stopColor="#66BB6A" /> <!-- Clair -->
        </linearGradient>
        <linearGradient id="grad2" x1="100%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stopColor="#2E7D32" />
            <stop offset="100%" stopColor="#81C784" />
        </linearGradient>
        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#1B5E20" />
            <stop offset="100%" stopColor="#4CAF50" />
        </linearGradient>
    </defs>

    <!-- 1. Cercle central blanc -->
    <circle cx="50" cy="50" r="23" fill="url(#centerWhite)" filter="url(#dropShadow)" />

    <!-- 2. Icône Möbius "Ruban Continu" -->
    <!-- Dessinée centrée. Échelle ajustée pour tenir dans r=23. -->
    <g transform="translate(50, 52) scale(0.32)">
        <g transform="translate(-50, -50)">
                <!-- Segment Bas -->
                <path fill="url(#grad1)" d="M24.2,50.7 L14.7,68.4 C10.6,66.3 7.8,61.9 8.2,57.1 L20,15.6 C21.4,11.1 26.2,8.6 30.6,10 L35.2,11.5 L24.2,50.7 Z" />
            <!-- Segment Droite -->
            <path fill="url(#grad2)" d="M78.6,54.7 L89.4,36.9 C91.7,41.1 91.9,46 89.8,50.3 L58,89.5 C55.3,93.4 50,94.3 46.1,91.8 L42.3,89.2 L78.6,54.7 Z" />
                <!-- Segment Gauche -->
            <path fill="url(#grad3)" d="M48.2,35.1 L13.4,35.1 C14.3,30.4 17.6,26.7 22,25.4 L80.8,8.2 C85.3,6.9 90,9.4 91.3,13.9 L92.6,18.4 L48.2,35.1 Z" />
        </g>
    </g>

    <!-- 3. Texte circulaire -->
    <text font-size="8.5" font-weight="800" fill="#C85A1E" letter-spacing="0.8" style="text-transform: uppercase; font-family: sans-serif;">
        <textPath href="#circlePath" startOffset="50%" text-anchor="middle" spacing="auto">
            Ouvert à tous • Ouvert à tous •
        </textPath>
    </text>
</svg>
